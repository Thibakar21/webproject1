<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDoc AI - V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar - History -->
        <aside class="sidebar glassmorphism">
            <div class="sidebar-header">
                <h2>History</h2>
                <button class="btn-icon" id="refreshHistoryBtn" title="Refresh History">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                </button>
            </div>
            <ul class="history-list" id="historyList">
                <li class="history-empty">No history found</li>
            </ul>
        </aside>

        <div class="main-wrapper">
            <header class="header">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <h1>AutoDoc AI</h1>
                </div>
                <p class="subtitle">Instantly generate beautiful, structured documentation directly from your code.</p>
            </header>

            <main class="main-content">
                <!-- Left Panel: Input -->
                <div class="panel input-panel glassmorphism">
                    <div class="panel-header">
                        <h2>Source Code</h2>
                        <div class="controls">
                            <!-- File Upload Native Hidden -->
                            <input type="file" id="fileInput" class="hide" />
                            <button id="uploadBtn" class="btn-secondary" title="Upload Code File">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                Upload
                            </button>
                            <button id="generateBtn" class="btn-primary">
                                <span class="btn-text">Generate Docs</span>
                                <div class="spinner hide" id="btnSpinner"></div>
                            </button>
                        </div>
                    </div>
                    <div class="editor-container">
                        <textarea id="codeInput" placeholder="Paste your source code in this area... or click Upload above."></textarea>
                    </div>
                </div>

                <!-- Right Panel: Output -->
                <div class="panel output-panel glassmorphism">
                    <div class="panel-header">
                        <h2>Generated Documentation</h2>
                        <button id="copyBtn" class="btn-secondary" title="Copy to clipboard">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                    <div class="markdown-container" id="outputContainer">
                        <div class="empty-state" id="emptyState">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                            <p>Paste your code or upload a file and click Generate Docs.</p>
                        </div>
                        <div class="markdown-body hide" id="markdownOutput"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast Notification Overlay -->
    <div id="toast" class="toast hide"></div>

    <script src="script.js"></script>
</body>
</html>
